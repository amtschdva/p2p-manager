<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Portal — P2P Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .portal-topbar {
      background: var(--sidebar-bg); color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; flex-wrap: wrap; gap: 10px;
    }
    .portal-topbar .brand { font-size: 18px; font-weight: 800; }
    .portal-topbar .brand span { color: #60a5fa; }
    .portal-tabs { display: flex; gap: 4px; padding: 0 28px; background: var(--sidebar-bg); }
    .portal-tabs button {
      background: none; border: none; color: var(--sidebar-text); font-weight: 600; font-size: 14px;
      padding: 12px 18px; cursor: pointer; border-bottom: 3px solid transparent;
    }
    .portal-tabs button.active { color: #fff; border-bottom-color: #60a5fa; }
    .portal-main { max-width: 1100px; margin: 0 auto; padding: 26px 20px; }
    .verify-banner {
      background: #fef3c7; color: #92400e; border: 1px solid #fde68a;
      border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; font-weight: 600;
    }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .auth-tabs button {
      flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); font-weight: 700; cursor: pointer;
    }
    .auth-tabs button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .login-card.wide { max-width: 560px; }
  </style>
</head>
<body>
  <!-- Auth screen -->
  <div id="auth-screen" class="login-screen hidden">
    <div class="login-card wide">
      <img src="/logo" alt="Company logo" class="brand-logo brand-logo-login" onerror="this.style.display='none'">
      <div class="login-logo">P2P<span>Manager</span></div>
      <p class="login-sub">Vendor / Supplier Portal</p>
      <div class="auth-tabs">
        <button id="tab-login" class="active">Sign in</button>
        <button id="tab-register">Register as vendor</button>
      </div>

      <form id="vlogin-form">
        <label>Email
          <input type="email" id="vlogin-email" autocomplete="username" required>
        </label>
        <label>Password
          <input type="password" id="vlogin-password" autocomplete="current-password" required>
        </label>
        <div id="vlogin-error" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
        <div class="login-hint">Demo vendor: <code>vendor@techsupply.in / vendor123</code> ·
          pending-verification demo: <code>deepak@nimbuscloud.in / nimbus123</code></div>
      </form>

      <form id="vregister-form" class="hidden">
        <div class="form-grid">
          <div class="field full"><label>Company name *</label><input name="company_name" required></div>
          <div class="field"><label>Contact person *</label><input name="contact_person" required></div>
          <div class="field"><label>Phone</label><input name="phone"></div>
          <div class="field"><label>Email (login) *</label><input name="email" type="email" required autocomplete="username"></div>
          <div class="field"><label>Password * (min 8, letters &amp; numbers)</label><input name="password" type="password" required minlength="8" autocomplete="new-password"></div>
          <div class="field full"><label>Registered address</label><textarea name="address"></textarea></div>
          <div class="field"><label>GSTIN</label><input name="gstin" placeholder="e.g. 29AABCT1234F1Z5"></div>
          <div class="field"><label>PAN</label><input name="pan" placeholder="e.g. AABCT1234F"></div>
          <div class="field"><label>Bank name</label><input name="bank_name"></div>
          <div class="field"><label>Account number</label><input name="bank_account"></div>
          <div class="field"><label>IFSC</label><input name="ifsc"></div>
        </div>
        <div id="vregister-error" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:14px">Submit registration</button>
        <div class="login-hint">After registration our procurement team verifies your details.
          You can sign in immediately to track your verification status.</div>
      </form>
    </div>
  </div>

  <!-- Portal shell -->
  <div id="portal-shell" class="hidden">
    <div class="portal-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <img src="/logo" alt="Company logo" class="brand-logo brand-logo-topbar" onerror="this.style.display='none'">
        <div class="brand">P2P<span>Manager</span> · Vendor Portal</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span id="vendor-name" style="font-weight:600"></span>
        <span id="vendor-verify-badge"></span>
        <button id="vbtn-logout" class="btn btn-ghost btn-sm">Sign out</button>
      </div>
    </div>
    <div class="portal-tabs">
      <button data-tab="pos" class="active">Purchase Orders</button>
      <button data-tab="invoices">My Invoices</button>
      <button data-tab="profile">Company Profile</button>
    </div>
    <main id="portal-main" class="portal-main"></main>
  </div>

  <!-- Modal -->
  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="/js/vendor.js"></script>
</body>
</html>
