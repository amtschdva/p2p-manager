# Production deployment: Traefik (TLS via Let's Encrypt) + PostgreSQL +
# core P2P app + (optional) standalone vendor-portal container.
#
# Modules per client are selected with MODULES in .env:
#   MODULES=all                      → everything (default)
#   MODULES=tax,payments             → no vendor portal
#   MODULES=                         → core only (PR/PO/GRN/invoices/approvals)
#
# Vendor portal deployment has two shapes:
#   1. COMBINED (default): include vendor_portal in MODULES; the app container
#      serves /vendor itself and the `vendor` service below stays commented out.
#   2. SPLIT: run the vendor portal as its own container — uncomment the
#      `vendor` service, remove vendor_portal from MODULES, and Traefik routes
#      /vendor + /api/vendor to it. Only the portal then needs to be
#      internet-facing; keep the staff allowlist enabled.
#
# Already running Traefik on this host? Delete the `traefik` service below,
# replace the `p2p` network with your existing Traefik network (external: true),
# and keep only the app service + labels.
#
# Usage:
#   cp .env.example .env   # then edit DOMAIN, ACME_EMAIL, JWT_SECRET, MODULES
#   docker compose up -d --build

services:
  traefik:
    image: traefik:v3.4
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - p2p

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=p2p
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=p2p
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p2p"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - p2p

  app:
    build:
      context: ..
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      # set to 1 in .env when serving plain HTTP (no TLS proxy in front),
      # otherwise the browser upgrades /css and /js to https:// and the app
      # loads unstyled with a blank screen after login
      - INSECURE_HTTP=${INSECURE_HTTP:-}
      - JWT_SECRET=${JWT_SECRET}
      - MODULES=${MODULES:-all}
      - DATABASE_URL=postgres://p2p:${POSTGRES_PASSWORD}@postgres:5432/p2p
      - APP_URL=${APP_URL:-https://${DOMAIN}}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-0}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    volumes:
      # vendor invoice uploads, KYC docs, logo and backups live here — back this directory up
      - ../data:/app/data
    networks:
      - p2p
    labels:
      - traefik.enable=true
      - traefik.http.services.p2p.loadbalancer.server.port=9139

      # --- vendor-facing routes: always public (COMBINED shape) ---
      # In the SPLIT shape these move to the `vendor` service below — delete
      # this router here and use the one on the vendor service instead.
      - traefik.http.routers.p2p-vendor.rule=Host(`${DOMAIN}`) && (PathPrefix(`/vendor`) || PathPrefix(`/api/vendor`) || PathPrefix(`/css`) || PathPrefix(`/js`) || Path(`/logo`) || PathRegexp(`^/api/invoices/[0-9]+/attachment`))
      - traefik.http.routers.p2p-vendor.priority=20
      - traefik.http.routers.p2p-vendor.entrypoints=websecure
      - traefik.http.routers.p2p-vendor.tls.certresolver=letsencrypt
      - traefik.http.routers.p2p-vendor.service=p2p

      # --- staff app + staff APIs: everything else on the domain ---
      - traefik.http.routers.p2p-staff.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.p2p-staff.priority=10
      - traefik.http.routers.p2p-staff.entrypoints=websecure
      - traefik.http.routers.p2p-staff.tls.certresolver=letsencrypt
      - traefik.http.routers.p2p-staff.service=p2p

      # RECOMMENDED: restrict the staff app to office/VPN IPs.
      # Set STAFF_ALLOWED_IPS in .env (comma-separated CIDRs) and uncomment:
      # - traefik.http.middlewares.staff-allowlist.ipallowlist.sourcerange=${STAFF_ALLOWED_IPS}
      # - traefik.http.routers.p2p-staff.middlewares=staff-allowlist

  # --- SPLIT shape: vendor portal as its own container -----------------------
  # Uncomment this service AND remove vendor_portal from MODULES above AND move
  # the p2p-vendor router labels here (service=p2p-vendor-svc). Shares the
  # database and the data volume (uploads/KYC docs) with the core app; the
  # JWT_SECRET must be identical.
  #
  # vendor:
  #   build:
  #     context: ..
  #   command: ["node", "src/vendor-server.js"]
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     - NODE_ENV=production
  #     - JWT_SECRET=${JWT_SECRET}
  #     - VENDOR_PORT=9140
  #     - DATABASE_URL=postgres://p2p:${POSTGRES_PASSWORD}@postgres:5432/p2p
  #     - APP_URL=${APP_URL:-https://${DOMAIN}}
  #   volumes:
  #     - ../data:/app/data
  #   networks:
  #     - p2p
  #   labels:
  #     - traefik.enable=true
  #     - traefik.http.services.p2p-vendor-svc.loadbalancer.server.port=9140
  #     - traefik.http.routers.p2p-vendor.rule=Host(`${DOMAIN}`) && (PathPrefix(`/vendor`) || PathPrefix(`/api/vendor`) || PathPrefix(`/css`) || PathPrefix(`/js`) || Path(`/logo`) || PathRegexp(`^/api/invoices/[0-9]+/attachment`))
  #     - traefik.http.routers.p2p-vendor.priority=20
  #     - traefik.http.routers.p2p-vendor.entrypoints=websecure
  #     - traefik.http.routers.p2p-vendor.tls.certresolver=letsencrypt
  #     - traefik.http.routers.p2p-vendor.service=p2p-vendor-svc

networks:
  p2p:

volumes:
  traefik-letsencrypt:
  pgdata:
